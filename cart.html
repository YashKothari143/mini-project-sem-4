<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenCart: Online Organic Grocery Store</title>

<link rel="stylesheet" href="cart.css">

</head>

<body>
    <div class="nav">
        <div class="page-nav">
        <a href="Home.html">🏠 Home</a>
        <span>›</span>
        <a href="cart.html" class="active">🛒 Cart</a>
    </div>
</div>


<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>GreenCart: Online Organic Grocery Store</h1>
        <p class="tagline">Fresh • Organic • Sustainable</p>
    </div>

    <div class="cart-container">
    <h2>Your Shopping Cart</h2>

    <table border="1" width="100%" id="cartTable">
        <thead>
            <tr>
                <th>Product Name</th>
                <th>Price (₹)</th>
                <th>Quantity</th>
                <th>Total (₹)</th>
            </tr>
        </thead>
        <tbody id="cartBody">
        </tbody>
    </table>

    <h3 id="grandTotal">Grand Total: ₹0</h3>

    <button onclick="checkout()">Place Order</button>

    <hr>

    <h2>Previous Bills</h2>
    <div id="billingHistory"></div>
</div>

<script src="Home.js"></script>
<script src="cart.js"></script>
</body>
</html>
