<html>
    <head>
        <title>
            Greencart: An E-comerce Platform For Online Groceries
        </title>
        <link rel="stylesheet" href="signup.css">
    </head>
<body class="backgroundsignup">

    <div class="signup_palete">
        <form>
            <div class="signup_contents">
                <h2 class="usersignuptext"><b>Sign in</b></h2>
                <label>Username</label>
                <input name="Username" id="username" class="inputsignup" type=text placeholder="Enter Username">
                <label>Email</label>
                <input name="Email" id="email" class="inputsignup" type="email" placeholder="Eg: abc@gmail.com">
                <label>Password</label>
                <input name="Password" id="password" class="inputsignup" type="password" placeholder="Enter Password">
                <a href="index.html" class="signuppage">Have an account? Log in</a>
                <button class="submitbutton" type="button" onclick="signupUser()">Sign up</button>
            </div>
        </form>
    </div>
    <script src="signup.js"></script>

</body>
</html>
