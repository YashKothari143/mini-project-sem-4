<html>
    <head>
        <title>
            Greencart: An E-comerce Platform For Online Groceries
        </title>
        <link rel="stylesheet" href="signup.css">
    </head>
<body class="backgroundsignup">

    <div class="signup_palete">
        <form method="post">
            <div class="signup_contents">
                <h2 class="usersignuptext"><b>Sign in</b></h2>
                <label>Username</label>
                <input name="Username" class="inputsignup" type=text placeholder="Enter Username">
                <label>Email</label>
                <input name="Email" class="inputsignup" type="email" placeholder="Eg: abc@gmail.com">
                <label>Password</label>
                <input name="Password" class="inputsignup" type="password" placeholder="Enter Password">
                <a href="index.html" class="signuppage">Have an account? Log in</a>
                <input class="submitbutton" type="submit" value="Sign up">
                <a class="adminloginbutton" href="adminlogin.html">Admin Log in</a>
            </div>
        </form>
    </div>

</body>
</html>
